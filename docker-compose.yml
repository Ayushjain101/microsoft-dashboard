version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tenants
      POSTGRES_USER: tenantadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dbpass}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenantadmin -d tenants"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tenantadmin:${DB_PASSWORD:-dbpass}@postgres:5432/tenants
      DATABASE_URL_SYNC: postgresql://tenantadmin:${DB_PASSWORD:-dbpass}@postgres:5432/tenants
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker -Q default,mailbox,monitor -c 4 --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tenantadmin:${DB_PASSWORD:-dbpass}@postgres:5432/tenants
      DATABASE_URL_SYNC: postgresql://tenantadmin:${DB_PASSWORD:-dbpass}@postgres:5432/tenants
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tenantadmin:${DB_PASSWORD:-dbpass}@postgres:5432/tenants
      DATABASE_URL_SYNC: postgresql://tenantadmin:${DB_PASSWORD:-dbpass}@postgres:5432/tenants
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
