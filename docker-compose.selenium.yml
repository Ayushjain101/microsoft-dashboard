version: "3.9"

# Deploy this on 15.204.174.187 (Selenium server)
# Points to Redis + PostgreSQL on 15.204.174.238 (Dashboard server)

services:
  selenium-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.selenium
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tenantadmin:${DB_PASSWORD:-dbpass}@15.204.174.238:5432/tenants
      DATABASE_URL_SYNC: postgresql://tenantadmin:${DB_PASSWORD:-dbpass}@15.204.174.238:5432/tenants
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@15.204.174.238:6379/0
    shm_size: "2gb"
    restart: unless-stopped
